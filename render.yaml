services:
  - type: web
    name: mazaohub-cms
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/auth/check
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mazaohub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: mazaohub-db
    databaseName: mazaohub
    user: mazaohub_admin
    plan: free
